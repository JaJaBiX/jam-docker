name: 'release: build & publish Docker images'

on:
  release:
    types: [ created ]

jobs:
  readenv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ github.ref_name }}
      description: ${{ steps.dotenv.outputs.description }}
      ui_repo: ${{ steps.dotenv.outputs.jam_repo }}
      ui_repo_ref: ${{ steps.dotenv.outputs.jam_repo_ref }}
      server_repo: ${{ steps.dotenv.outputs.jm_server_repo }}
      server_repo_ref: ${{ steps.dotenv.outputs.jm_server_repo_ref }}
      skip_release_verification: ${{ steps.dotenv.outputs.skip_release_verification }}
      jm_install_script_args: ${{ steps.dotenv.outputs.jm_install_script_args }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Read .env file
        id: dotenv
        uses: falti/dotenv-action@v1.2.0
        with:
          log-variables: true

  image-on-release:
    uses: ./.github/workflows/create-and-publish-docker.yml
    needs: readenv
    with:
      version: ${{ needs.readenv.outputs.version }}
      description: ${{ needs.readenv.outputs.description }}
      ui_repo: ${{ needs.readenv.outputs.ui_repo }}
      ui_repo_ref: ${{ needs.readenv.outputs.ui_repo_ref }}
      server_repo: ${{ needs.readenv.outputs.server_repo }}
      server_repo_ref: ${{ needs.readenv.outputs.server_repo_ref }}
      image_name_prefix: jajabix/jam-
      skip_release_verification: ${{ needs.readenv.outputs.skip_release_verification == 'true' }}
      jm_install_script_args: ${{ needs.readenv.outputs.jm_install_script_args || '--disable-secp-check' }}
