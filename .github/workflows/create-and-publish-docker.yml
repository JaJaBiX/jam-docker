name: 'call: create-and-publish-docker'

on:
  workflow_call:
    inputs:
      version:
        description: 'docker app version (e.g. v21.0.0)'
        required: true
        type: string
      description:
        description: 'docker app description (e.g. "Your sats. Your privacy. Your profit.")'
        required: true
        type: string
      ui_repo_ref:
        description: 'ui version/branch (e.g. v0.1.1, master, etc.)'
        required: true
        type: string
      ui_repo:
        description: 'ui git repo'
        required: true
        type: string
      server_repo_ref:
        description: 'server version/branch (e.g. v0.9.8, master, etc.)'
        required: true
        type: string
      server_repo:
        description: 'server git repo'
        required: true
        type: string
      image_name_prefix:
        description: 'image name prefix (e.g. joinmarket-webui/jam-)'
        required: true
        type: string
      skip_release_verification:
        description: 'enable skipping release verification'
        required: false
        default: false
        type: boolean
      jm_install_script_args:
        description: 'extra arguments passed to joinmarket install.sh in standalone image'
        required: false
        default: '--disable-secp-check'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    strategy:
      matrix:
         context: [ ui-only, standalone ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve source refs for cache keys
        id: source-refs
        shell: bash
        env:
          JAM_REPO: ${{ inputs.ui_repo }}
          JAM_REPO_REF: ${{ inputs.ui_repo_ref }}
          JM_SERVER_REPO: ${{ inputs.server_repo }}
          JM_SERVER_REPO_REF: ${{ inputs.server_repo_ref }}
          JM_INSTALL_SCRIPT_ARGS: ${{ inputs.jm_install_script_args }}
        run: |
          set -euo pipefail

          resolve_ref() {
            local repo="$1"
            local ref="$2"
            local resolved=""

            if [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]]; then
              resolved="$ref"
            else
              resolved="$(git ls-remote "$repo" "refs/tags/$ref^{}" |
                awk 'NR == 1 { print $1 }')"
              if [[ -z "$resolved" ]]; then
                resolved="$(git ls-remote "$repo" "refs/tags/$ref" |
                  awk 'NR == 1 { print $1 }')"
              fi
              if [[ -z "$resolved" ]]; then
                resolved="$(git ls-remote "$repo" "refs/heads/$ref" |
                  awk 'NR == 1 { print $1 }')"
              fi
              if [[ -z "$resolved" ]]; then
                resolved="$(git ls-remote "$repo" "$ref" |
                  awk 'NR == 1 { print $1 }')"
              fi
            fi

            if [[ -z "$resolved" ]]; then
              echo "::error::Cannot resolve $repo ref $ref"
              return 1
            fi

            printf '%s\n' "$resolved"
          }

          jam_repo_resolved_ref="$(resolve_ref "$JAM_REPO" "$JAM_REPO_REF")"
          jm_server_repo_resolved_ref="$(resolve_ref "$JM_SERVER_REPO" "$JM_SERVER_REPO_REF")"
          jam_repo_ref_short="${jam_repo_resolved_ref:0:12}"
          jm_server_repo_ref_short="${jm_server_repo_resolved_ref:0:12}"
          native_deps_cache_key="$(
            {
              printf 'JM_INSTALL_SCRIPT_ARGS=%s\n' "$JM_INSTALL_SCRIPT_ARGS"
              awk '
                /^ARG DEBIAN_IMAGE/ { print }
                index($0, "FROM ${DEBIAN_IMAGE} AS native-deps") { in_native = 1 }
                in_native { print }
                /^# --- Native dependency builder - end/ { in_native = 0 }
              ' standalone/Dockerfile
              sha256sum standalone/build-native-deps.sh
              find standalone/pubkeys/third-party -type f -exec sha256sum {} + | sort -k2
            } | sha256sum | cut --characters=1-12
          )"

          {
            echo "jam_repo_resolved_ref=$jam_repo_resolved_ref"
            echo "jm_server_repo_resolved_ref=$jm_server_repo_resolved_ref"
            echo "cache_key=jam-${jam_repo_ref_short}-jm-${jm_server_repo_ref_short}"
            echo "native_deps_cache_key=$native_deps_cache_key"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved JAM_REPO_REF=$JAM_REPO_REF to $jam_repo_resolved_ref"
          echo "Resolved JM_SERVER_REPO_REF=$JM_SERVER_REPO_REF to $jm_server_repo_resolved_ref"
          echo "Resolved native deps cache key to $native_deps_cache_key"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ !endsWith(inputs.version, '-dev') }}
          labels: |
            org.opencontainers.image.title=jam-${{ matrix.context }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.description=${{ inputs.description }}

      - name: Build standalone native dependency cache
        if: matrix.context == 'standalone'
        uses: docker/build-push-action@v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./standalone
          target: native-deps
          platforms: linux/amd64,linux/arm64
          outputs: type=cacheonly
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}standalone:buildcache-native-deps-${{ steps.source-refs.outputs.native_deps_cache_key }}
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}standalone:buildcache-native-deps
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}standalone:buildcache
            ${{ startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-standalone:buildcache-native-deps-{1}', env.REGISTRY, steps.source-refs.outputs.native_deps_cache_key) || '' }}
            ${{ startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-standalone:buildcache-native-deps', env.REGISTRY) || '' }}
            ${{ startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-standalone:buildcache', env.REGISTRY) || '' }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}standalone:buildcache-native-deps-${{ steps.source-refs.outputs.native_deps_cache_key }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}standalone:buildcache-native-deps,mode=max
          build-args: |
            JM_INSTALL_SCRIPT_ARGS=${{ inputs.jm_install_script_args }}

      - name: Build and push Docker image for ${{ matrix.context }}
        uses: docker/build-push-action@v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            ${{ matrix.context == 'standalone' && format('type=registry,ref={0}/{1}standalone:buildcache-native-deps-{2}', env.REGISTRY, inputs.image_name_prefix, steps.source-refs.outputs.native_deps_cache_key) || '' }}
            ${{ matrix.context == 'standalone' && format('type=registry,ref={0}/{1}standalone:buildcache-native-deps', env.REGISTRY, inputs.image_name_prefix) || '' }}
            type=gha,scope=jam-${{ matrix.context }}-${{ steps.source-refs.outputs.cache_key }}
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}:buildcache-${{ steps.source-refs.outputs.cache_key }}
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}:buildcache
            ${{ !endsWith(inputs.version, '-dev') && format('type=registry,ref={0}/{1}{2}:latest', env.REGISTRY, inputs.image_name_prefix, matrix.context) || '' }}
            ${{ matrix.context == 'standalone' && startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-standalone:buildcache-native-deps-{1}', env.REGISTRY, steps.source-refs.outputs.native_deps_cache_key) || '' }}
            ${{ matrix.context == 'standalone' && startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-standalone:buildcache-native-deps', env.REGISTRY) || '' }}
            ${{ startsWith(inputs.image_name_prefix, 'jajabix/jam-dev-') && format('type=registry,ref={0}/jajabix/jam-{1}:buildcache', env.REGISTRY, matrix.context) || '' }}
          cache-to: |
            type=gha,scope=jam-${{ matrix.context }}-${{ steps.source-refs.outputs.cache_key }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}:buildcache-${{ steps.source-refs.outputs.cache_key }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}:buildcache,mode=max
          build-args: |
            JAM_REPO=${{ inputs.ui_repo }}
            JAM_REPO_REF=${{ inputs.ui_repo_ref }}
            JAM_REPO_RESOLVED_REF=${{ steps.source-refs.outputs.jam_repo_resolved_ref }}
            JM_SERVER_REPO=${{ inputs.server_repo }}
            JM_SERVER_REPO_REF=${{ inputs.server_repo_ref }}
            JM_SERVER_REPO_RESOLVED_REF=${{ steps.source-refs.outputs.jm_server_repo_resolved_ref }}
            SKIP_RELEASE_VERIFICATION=${{ inputs.skip_release_verification }}
            JM_INSTALL_SCRIPT_ARGS=${{ inputs.jm_install_script_args }}
